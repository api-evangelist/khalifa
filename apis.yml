aid: khalifa
name: Khalifa University
description: >-
  Khalifa University of Science and Technology is a research-intensive
  university in Abu Dhabi, United Arab Emirates, ranked #202 in the QS World
  University Rankings 2025. It operates colleges of Engineering and Physical
  Sciences, Computing and Mathematical Sciences, and Medicine and Health
  Sciences, along with multiple research centers. No central public,
  documented developer or API program was found; student and administrative
  systems (KU Connect portal, Banner registration, e-Learn, library
  discovery) are gated behind institutional authentication. The only confirmed
  public code footprint is the GitHub organization of its Center for Autonomous
  Robotic Systems (KUCARS), which publishes open-source robotics research
  repositories rather than a managed, documented API.
